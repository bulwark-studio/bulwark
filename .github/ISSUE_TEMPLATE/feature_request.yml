name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Bulwark? We'd love to hear it.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the current pain point?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard / UI
        - Terminal
        - Docker
        - Database Studio
        - Git / Deploy
        - Security
        - Monitoring
        - AI Features
        - API
        - New View / Module
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about?
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, mockups, or links to similar features in other tools
